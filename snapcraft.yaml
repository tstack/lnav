name: lnav
adopt-info: lnav
summary: Log File Navigator
description: |
  The Log File Navigator is a log file viewer for the terminal.
icon: docs/assets/images/favicon.png
contact: support@lnav.org
website: https://lnav.org
issues: https://github.com/tstack/lnav/issues
source-code: https://github.com/tstack/lnav
donation: https://github.com/sponsors/tstack

base: core22
grade: stable
confinement: strict

environment:
  LOCPATH: $SNAP/usr/lib/locale
  GIT_TEMPLATE_DIR: $SNAP/usr/share/git-core/templates
  GIT_EXEC_PATH: $SNAP/usr/lib/git-core

plugs:
  etc-lnav:
    interface: system-files
    read:
      - /etc/lnav

slots:
  lnav-bin:
    interface: content
    content: lnav
    source:
      read:
        - $SNAP/bin

apps:
  lnav:
    command: usr/bin/lnav
    plugs:
      - etc-lnav
      - home            # optional, allows to read log files from home directory
      - log-observe     # required, provide access to system logs in /var/log
      - network         # required, lnav uses sendto() with UNIX domain socket
      - removable-media
      - ssh-keys
      - x11

parts:
  rustup:
    plugin: rust
    rust-channel: stable
    source: .
    override-build: ""
    override-prime: ""
  lnav:
    after:
      - rustup
    plugin: autotools
    autotools-configure-parameters:
      - CFLAGS="-O2"
      - CXXFLAGS="-O2"
      - PATH="${HOME}/.cargo/bin:${PATH}"
    source: https://github.com/tstack/lnav.git
    source-depth: 500
    override-pull: |
      craftctl default
      ${CRAFT_PROJECT_DIR}/snap/local/scriptlets/selective-checkout --force-snapshot
    override-build: |
      craftctl default
      execstack --clear-execstack $SNAPCRAFT_PART_INSTALL/usr/bin/lnav || true
    build-packages:
      - git
      - curl
      - jq
      - sed
      - build-essential
      - libarchive-dev
      - libcurl4-gnutls-dev
      - libpcre2-dev
      - libsqlite3-dev
      - libunistring-dev
      - zlib1g-dev
      - libbz2-dev
      - execstack
    stage-packages:
      - zlib1g
      - git-core
      - libcurl4
      - libpcre2-8-0
      - libarchive13
      - libicu70
      - libxml2
      - locales-all
      - ssh
      - tshark
      - xclip
